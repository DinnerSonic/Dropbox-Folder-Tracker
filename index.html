<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dropbox Folder Tracker</title>
<style>
  :root {
    --bg: #0f1419;
    --panel: #1a2029;
    --panel-2: #222b36;
    --border: #2e3947;
    --text: #e6edf3;
    --muted: #8b98a5;
    --accent: #2f7cf6;
    --accent-hover: #4a90ff;
    --new: #f5a623;
    --new-bg: rgba(245, 166, 35, 0.12);
    --ok: #3fb950;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  h1 { font-size: 18px; margin: 0; font-weight: 600; }
  .spacer { flex: 1; }
  main { max-width: 960px; margin: 0 auto; padding: 24px; }
  button {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 9px 16px;
    border-radius: 7px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
  button:hover { background: var(--accent-hover); }
  button.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  button.ghost:hover { background: var(--panel-2); }
  button:disabled { opacity: 0.5; cursor: default; }
  button.small { padding: 5px 10px; font-size: 13px; }
  input[type=text] {
    flex: 1;
    min-width: 240px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 7px;
    font-size: 14px;
  }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .card.is-new { border-color: var(--new); background: var(--new-bg); }
  .folder-head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    cursor: pointer;
  }
  .folder-head:hover { background: rgba(255,255,255,0.02); }
  .folder-name { font-weight: 600; word-break: break-word; }
  .badge {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 5px;
    background: var(--new);
    color: #1a1200;
    letter-spacing: 0.4px;
    white-space: nowrap;
  }
  .meta { color: var(--muted); font-size: 13px; margin-left: auto; text-align: right; white-space: nowrap; }
  .src { color: var(--muted); font-size: 12px; }
  .children { border-top: 1px solid var(--border); padding: 4px 0; display: none; }
  .children.open { display: block; }
  .child {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 16px;
    font-size: 13px;
  }
  .child:hover { background: rgba(255,255,255,0.02); }
  .child .cname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .child.is-new .cname { color: var(--new); font-weight: 600; }
  .child .cdate { color: var(--muted); white-space: nowrap; }
  .saved-links { margin-bottom: 20px; }
  .saved-link {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 7px; margin-bottom: 6px; font-size: 13px;
  }
  .saved-link .url { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted); }
  .status { color: var(--muted); font-size: 13px; margin: 8px 0; min-height: 18px; white-space: pre-wrap; }
  .error { color: #f0716f; }
  .caret { transition: transform 0.15s; color: var(--muted); width: 12px; display: inline-block; }
  .caret.open { transform: rotate(90deg); }
  a { color: var(--accent-hover); }
  .hint { color: var(--muted); font-size: 13px; }
  .connected { color: var(--ok); font-size: 13px; display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); }
  .progress-wrap { height: 6px; background: var(--panel-2); border-radius: 3px; overflow: hidden; margin: 8px 0; display: none; }
  .progress-bar { height: 100%; width: 0; background: var(--accent); transition: width 0.2s; }
</style>
</head>
<body>
<header>
  <h1>📦 Dropbox Folder Tracker</h1>
  <div class="spacer"></div>
  <span id="authStatus"></span>
  <button id="connectBtn" class="ghost">Connect Dropbox</button>
</header>

<main>
  <div id="setupNotice" style="display:none" class="card">
    <div style="padding:16px">
      <strong>⚙️ One-time setup needed.</strong>
      <p class="hint">The app key hasn't been filled in yet. Open <code>index.html</code> and set
      <code>CONFIG.APP_KEY</code>. See the README.</p>
    </div>
  </div>

  <div id="app" style="display:none">
    <div class="row">
      <input id="linkInput" type="text" placeholder="Paste a Dropbox shared folder link…" />
      <button id="addBtn">Add link</button>
    </div>

    <div id="savedLinks" class="saved-links"></div>

    <div class="row">
      <button id="refreshBtn">🔄 Check for updates</button>
      <button id="markSeenBtn" class="ghost">Mark all as seen</button>
      <div class="spacer"></div>
      <span class="hint" id="lastCheck"></span>
    </div>

    <div class="progress-wrap" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>
    <div id="status" class="status"></div>
    <div id="results"></div>
  </div>

  <div id="signedOut" style="display:none">
    <p class="hint">Connect your Dropbox account to get started. You only do this once —
    the app then remembers you on this computer.</p>
  </div>
</main>

<script>
/* ============================================================================
   CONFIG — APP_KEY is your Dropbox app's "App key" (public, safe with PKCE).
   ========================================================================== */
const CONFIG = {
  APP_KEY: "uzwm5jp3hh22zz8",
  SCOPES: "account_info.read files.metadata.read sharing.read files.content.read",
  // How many folder-listing requests to run at once during a scan.
  // Dropbox has NO working "recursive" mode for shared links, so every
  // subfolder must be listed individually — keep this modest to avoid 429s.
  SCAN_CONCURRENCY: 8,
};
const REDIRECT_URI = window.location.origin + window.location.pathname;
const API = "https://api.dropboxapi.com/2/files/list_folder";
const API_CONT = "https://api.dropboxapi.com/2/files/list_folder/continue";

/* ---------- helpers ---------- */
const $ = (id) => document.getElementById(id);
const LS = {
  get: (k, d) => { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch { return d; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) { console.warn("localStorage full", e); } },
  del: (k) => localStorage.removeItem(k),
};
const fmtDate = (iso) => {
  if (!iso) return "—";
  const d = new Date(iso);
  const days = Math.floor((Date.now() - d) / 86400000);
  const rel = days < 0 ? "" : days === 0 ? "today" : days === 1 ? "yesterday" : `${days}d ago`;
  return `${d.toLocaleDateString()}${rel ? " (" + rel + ")" : ""}`;
};
const esc = (s) => (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");

/* ---------- PKCE auth ---------- */
function randomString(len) {
  const a = new Uint8Array(len);
  crypto.getRandomValues(a);
  return Array.from(a, (b) => ("0" + b.toString(16)).slice(-2)).join("");
}
function base64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}
async function pkceChallenge(v) {
  return base64url(await crypto.subtle.digest("SHA-256", new TextEncoder().encode(v)));
}
async function startAuth() {
  const verifier = randomString(48);
  sessionStorage.setItem("pkce_verifier", verifier);
  const params = new URLSearchParams({
    client_id: CONFIG.APP_KEY, response_type: "code",
    code_challenge: await pkceChallenge(verifier), code_challenge_method: "S256",
    redirect_uri: REDIRECT_URI, token_access_type: "offline", scope: CONFIG.SCOPES,
  });
  window.location = "https://www.dropbox.com/oauth2/authorize?" + params;
}
async function exchangeCode(code) {
  const body = new URLSearchParams({
    code, grant_type: "authorization_code", redirect_uri: REDIRECT_URI,
    client_id: CONFIG.APP_KEY, code_verifier: sessionStorage.getItem("pkce_verifier"),
  });
  const res = await fetch("https://api.dropboxapi.com/oauth2/token", {
    method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body });
  if (!res.ok) throw new Error("Token exchange failed: " + (await res.text()));
  const tok = await res.json();
  LS.set("dbx_refresh", tok.refresh_token);
  LS.set("dbx_access", { token: tok.access_token, exp: Date.now() + (tok.expires_in - 60) * 1000 });
}
async function getAccessToken() {
  const cached = LS.get("dbx_access", null);
  if (cached && cached.exp > Date.now()) return cached.token;
  const refresh = LS.get("dbx_refresh", null);
  if (!refresh) return null;
  const body = new URLSearchParams({ grant_type: "refresh_token", refresh_token: refresh, client_id: CONFIG.APP_KEY });
  const res = await fetch("https://api.dropboxapi.com/oauth2/token", {
    method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body });
  if (!res.ok) { LS.del("dbx_refresh"); return null; }
  const tok = await res.json();
  LS.set("dbx_access", { token: tok.access_token, exp: Date.now() + (tok.expires_in - 60) * 1000 });
  return tok.access_token;
}
const isConnected = () => !!LS.get("dbx_refresh", null);
function disconnect() { LS.del("dbx_refresh"); LS.del("dbx_access"); lastResults = []; render(); }

/* ---------- Dropbox API with 429 backoff ---------- */
async function dbxFetch(url, options, attempt = 0) {
  const res = await fetch(url, options);
  if (res.status === 429 && attempt < 6) {
    const retry = parseInt(res.headers.get("Retry-After") || "2", 10);
    setStatus(`Rate limited by Dropbox — waiting ${retry}s…`);
    await new Promise((r) => setTimeout(r, retry * 1000));
    return dbxFetch(url, options, attempt + 1);
  }
  return res;
}

// List ONE folder's immediate children (non-recursive; recursive is broken for
// shared links). `path` is "" for the shared root, or "/Sub/Folder" relative to it.
async function listChildren(url, path, token) {
  const entries = [];
  let endpoint = API;
  let body = { path, shared_link: { url }, recursive: false, include_deleted: false };
  while (true) {
    const res = await dbxFetch(endpoint, {
      method: "POST",
      headers: { Authorization: "Bearer " + token, "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error(`${res.status}: ${(await res.text()).slice(0, 200)}`);
    const data = await res.json();
    entries.push(...data.entries);
    if (!data.has_more) break;
    endpoint = API_CONT;
    body = { cursor: data.cursor };
  }
  return entries;
}

// Walk a shared link folder-by-folder, computing the newest file date inside
// each TOP-LEVEL subfolder (searching all the way down). Returns folder records.
async function scanLink(url, token, onProgress) {
  const root = await listChildren(url, "", token);
  const records = [];
  const rootFiles = [];
  for (const e of root) {
    if (e[".tag"] === "folder") records.push({ name: e.name, path: "/" + e.name, newest: null });
    else if (e[".tag"] === "file") rootFiles.push(e);
  }
  const queue = records.map((r) => ({ relPath: r.path, record: r }));
  let processed = 0, discovered = queue.length;
  async function worker() {
    while (queue.length) {
      const { relPath, record } = queue.shift();
      try {
        const entries = await listChildren(url, relPath, token);
        for (const e of entries) {
          if (e[".tag"] === "file") {
            if (!record.newest || e.server_modified > record.newest) record.newest = e.server_modified;
          } else if (e[".tag"] === "folder") {
            queue.push({ relPath: relPath + "/" + e.name, record });
            discovered++;
          }
        }
      } catch (e) { /* skip unreadable folder, keep going */ }
      processed++;
      if (onProgress) onProgress(processed, discovered);
    }
  }
  await Promise.all(Array.from({ length: Math.min(CONFIG.SCAN_CONCURRENCY, queue.length || 1) }, worker));
  if (rootFiles.length) {
    let newest = null;
    for (const f of rootFiles) if (!newest || f.server_modified > newest) newest = f.server_modified;
    records.push({ name: "(files in root)", path: "", newest, isRoot: true });
  }
  return records;
}

// Escape non-ASCII for the Dropbox-API-Arg header (required by Dropbox).
function httpHeaderSafe(s) {
  let out = "";
  for (const ch of s) {
    const c = ch.charCodeAt(0);
    out += c > 0x7f ? "\\u" + ("0000" + c.toString(16)).slice(-4) : ch;
  }
  return out;
}
async function downloadFile(linkUrl, path, filename, token) {
  const res = await dbxFetch("https://content.dropboxapi.com/2/sharing/get_shared_link_file", {
    method: "POST",
    headers: {
      Authorization: "Bearer " + token,
      "Dropbox-API-Arg": httpHeaderSafe(JSON.stringify({ url: linkUrl, path })),
    },
  });
  if (!res.ok) { alert("Download failed: " + (await res.text())); return; }
  const blob = await res.blob();
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 10000);
}

/* ---------- state ---------- */
const getLinks = () => LS.get("dbx_links", []);            // [{url, name}]
const getSeen = () => LS.get("dbx_seen", {});              // { "url::folder": iso }
const getCache = () => LS.get("dbx_cache", {});            // { url: { scannedAt, folders:{name:newest} } }
const seenKey = (url, folder) => `${url}::${folder}`;
let lastResults = [];   // [{ link, records:[{name,path,newest}] }]

function setStatus(msg, isError = false) {
  const el = $("status"); el.textContent = msg || ""; el.className = "status" + (isError ? " error" : "");
}
function setProgress(done, total) {
  const w = $("progressWrap"), b = $("progressBar");
  if (total == null) { w.style.display = "none"; return; }
  w.style.display = "block";
  b.style.width = (total ? Math.round((done / total) * 100) : 0) + "%";
}

/* ---------- refresh (scan all links) ---------- */
async function refresh() {
  const token = await getAccessToken();
  if (!token) { render(); return; }
  const links = getLinks();
  if (!links.length) { setStatus("Add a shared link above to begin."); $("results").innerHTML = ""; return; }

  $("refreshBtn").disabled = true;
  lastResults = [];
  const cache = getCache();
  const errors = [];

  for (let i = 0; i < links.length; i++) {
    const link = links[i];
    const label = link.name || link.url;
    setStatus(`Scanning "${label}" (${i + 1}/${links.length})… folders can be many, this may take a minute.`);
    try {
      const records = await scanLink(link.url, token, (done, total) => {
        setProgress(done, total);
        setStatus(`Scanning "${label}" (${i + 1}/${links.length}) — ${done}/${total} folders`);
      });
      lastResults.push({ link, records });
      cache[link.url] = { scannedAt: Date.now(), folders: Object.fromEntries(records.map((r) => [r.name, r.newest])) };
    } catch (e) {
      errors.push(`${label}: ${e.message}`);
    }
  }

  LS.set("dbx_cache", cache);
  LS.set("dbx_lastCheck", Date.now());
  setProgress(null);
  $("refreshBtn").disabled = false;
  setStatus(errors.length ? "Some links failed:\n" + errors.join("\n") : "", errors.length > 0);
  renderResults();
  updateLastCheck();
}

/* ---------- rendering ---------- */
function updateLastCheck() {
  const t = LS.get("dbx_lastCheck", null);
  $("lastCheck").textContent = t ? "Last checked: " + fmtDate(new Date(t).toISOString()) : "";
}

function renderSavedLinks() {
  const wrap = $("savedLinks"), links = getLinks();
  wrap.innerHTML = links.length ? "" : '<span class="hint">No links added yet.</span>';
  links.forEach((link, i) => {
    const row = document.createElement("div");
    row.className = "saved-link";
    row.innerHTML = `<span>🔗</span><input class="linkname" data-i="${i}" type="text" value="${esc(link.name)}"
      placeholder="Nickname (optional)" style="flex:0 0 200px;background:transparent;border:none;color:var(--text)"/>
      <span class="url">${esc(link.url)}</span>
      <button class="ghost small" data-del="${i}">Remove</button>`;
    wrap.appendChild(row);
  });
  wrap.querySelectorAll("[data-del]").forEach((b) =>
    b.onclick = () => { const l = getLinks(); l.splice(+b.dataset.del, 1); LS.set("dbx_links", l); renderSavedLinks(); });
  wrap.querySelectorAll(".linkname").forEach((inp) =>
    inp.onchange = () => { const l = getLinks(); l[+inp.dataset.i].name = inp.value; LS.set("dbx_links", l); });
}

function renderResults() {
  const seen = getSeen(), results = $("results");
  results.innerHTML = "";
  const all = [];
  for (const r of lastResults)
    for (const f of r.records) {
      const last = seen[seenKey(r.link.url, f.name)] || null;
      const isNew = f.newest && (!last || f.newest > last);
      all.push({ ...f, link: r.link, isNew });
    }
  all.sort((a, b) => (b.newest || "").localeCompare(a.newest || ""));

  if (!all.length) { setStatus('No folders found. Click "Check for updates" to scan.'); return; }

  const newCount = all.filter((f) => f.isNew).length;
  if (newCount) setStatus(`${newCount} folder${newCount === 1 ? "" : "s"} updated since you last marked as seen.`);

  for (const f of all) {
    const card = document.createElement("div");
    card.className = "card" + (f.isNew ? " is-new" : "");
    card.innerHTML = `
      <div class="folder-head">
        <span class="caret">▶</span>
        <div>
          <div><span class="folder-name">${esc(f.name)}</span> ${f.isNew ? '<span class="badge">NEW</span>' : ""}</div>
          ${lastResults.length > 1 ? `<div class="src">from ${esc(f.link.name || f.link.url)}</div>` : ""}
        </div>
        <div class="meta">${f.newest ? "newest: " + fmtDate(f.newest) : "no files"}</div>
      </div>
      <div class="children"></div>`;
    const head = card.querySelector(".folder-head");
    const box = card.querySelector(".children");
    const caret = card.querySelector(".caret");
    let loaded = false;
    head.onclick = async () => {
      const opening = !box.classList.contains("open");
      box.classList.toggle("open"); caret.classList.toggle("open");
      if (opening && !loaded) { loaded = true; await renderChildren(box, f.link.url, f.path, seen[seenKey(f.link.url, f.name)]); }
    };
    results.appendChild(card);
  }
}

// Lazily list one folder's immediate children into `container` (files download,
// subfolders expand deeper).
async function renderChildren(container, url, path, seenIso, depth = 0) {
  container.innerHTML = `<div class="child" style="padding-left:${16 + depth * 18}px">loading…</div>`;
  const token = await getAccessToken();
  let entries;
  try { entries = await listChildren(url, path, token); }
  catch (e) { container.innerHTML = `<div class="child error">Failed: ${esc(e.message)}</div>`; return; }

  const folders = entries.filter((e) => e[".tag"] === "folder").sort((a, b) => a.name.localeCompare(b.name));
  const files = entries.filter((e) => e[".tag"] === "file").sort((a, b) => (b.server_modified || "").localeCompare(a.server_modified || ""));
  container.innerHTML = "";
  const pad = 16 + depth * 18;

  for (const fo of folders) {
    const childPath = path + "/" + fo.name;
    const row = document.createElement("div");
    row.className = "child";
    row.style.paddingLeft = pad + "px";
    row.innerHTML = `<span class="caret">▶</span><span class="cname">📁 ${esc(fo.name)}</span>`;
    const sub = document.createElement("div");
    sub.className = "children";
    let done = false;
    row.onclick = async () => {
      const opening = !sub.classList.contains("open");
      sub.classList.toggle("open"); row.querySelector(".caret").classList.toggle("open");
      if (opening && !done) { done = true; await renderChildren(sub, url, childPath, seenIso, depth + 1); }
    };
    container.appendChild(row);
    container.appendChild(sub);
  }
  for (const fi of files) {
    const isNew = seenIso ? fi.server_modified > seenIso : false;
    const filePath = path + "/" + fi.name;
    const row = document.createElement("div");
    row.className = "child" + (isNew ? " is-new" : "");
    row.style.paddingLeft = pad + 18 + "px";
    row.innerHTML = `<span class="cname">${isNew ? "● " : ""}${esc(fi.name)}</span>
      <span class="cdate">${fmtDate(fi.server_modified)}</span>
      <button class="ghost small dl">Download</button>`;
    row.querySelector(".dl").onclick = async (ev) => {
      ev.stopPropagation();
      const btn = ev.target; btn.disabled = true; btn.textContent = "…";
      await downloadFile(url, filePath, fi.name, await getAccessToken());
      btn.disabled = false; btn.textContent = "Download";
    };
    container.appendChild(row);
  }
  if (!entries.length) container.innerHTML = `<div class="child" style="padding-left:${pad}px">(empty)</div>`;
}

function markAllSeen() {
  const seen = getSeen();
  for (const r of lastResults)
    for (const f of r.records) if (f.newest) seen[seenKey(r.link.url, f.name)] = f.newest;
  LS.set("dbx_seen", seen);
  renderResults();
  setStatus("Marked everything as seen. Future changes will be highlighted.");
}

// Build lastResults from cache (for instant display on load, before a rescan).
function loadFromCache() {
  const cache = getCache(), links = getLinks();
  lastResults = [];
  for (const link of links) {
    const c = cache[link.url];
    if (!c) continue;
    const records = Object.entries(c.folders).map(([name, newest]) => ({
      name, newest, path: name === "(files in root)" ? "" : "/" + name, isRoot: name === "(files in root)",
    }));
    lastResults.push({ link, records });
  }
}

/* ---------- top-level render ---------- */
function render() {
  const configured = CONFIG.APP_KEY && CONFIG.APP_KEY !== "PASTE_YOUR_DROPBOX_APP_KEY";
  $("setupNotice").style.display = configured ? "none" : "block";
  const connected = isConnected();
  $("authStatus").innerHTML = connected ? '<span class="connected"><span class="dot"></span>Connected</span>' : "";
  $("connectBtn").textContent = connected ? "Disconnect" : "Connect Dropbox";
  $("connectBtn").onclick = connected ? disconnect : startAuth;
  $("connectBtn").disabled = !configured;
  $("app").style.display = connected && configured ? "block" : "none";
  $("signedOut").style.display = !connected && configured ? "block" : "none";
  if (connected && configured) {
    renderSavedLinks();
    updateLastCheck();
    if (lastResults.length) renderResults();
  }
}

/* ---------- wire up + boot ---------- */
$("addBtn").onclick = () => {
  const url = $("linkInput").value.trim();
  if (!url) return;
  if (!/^https?:\/\/(www\.)?dropbox\.com\/(scl|sh)\//i.test(url)) {
    setStatus("That doesn't look like a Dropbox shared link. Use Dropbox → Copy link (a /scl/ or /sh/ URL). A /home/ URL won't work.", true);
    return;
  }
  const links = getLinks();
  if (links.some((l) => l.url === url)) { setStatus("That link is already added."); return; }
  links.push({ url, name: "" });
  LS.set("dbx_links", links);
  $("linkInput").value = "";
  renderSavedLinks();
  setStatus('Link added. Click "Check for updates".');
};
$("linkInput").addEventListener("keydown", (e) => { if (e.key === "Enter") $("addBtn").click(); });
$("refreshBtn").onclick = refresh;
$("markSeenBtn").onclick = markAllSeen;

(async function boot() {
  const params = new URLSearchParams(window.location.search);
  if (params.get("code")) {
    try { setStatus("Finishing sign-in…"); await exchangeCode(params.get("code")); }
    catch (e) { setStatus(e.message, true); }
    window.history.replaceState({}, "", REDIRECT_URI);
  }
  loadFromCache();
  render();
  // Don't auto-scan (can be slow for big libraries) — show cached results and
  // let the user click "Check for updates".
  if (isConnected() && !lastResults.length && getLinks().length) {
    setStatus('Click "Check for updates" to scan your folders.');
  }
})();
</script>
